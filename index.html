{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Weather App</title>

    <!-- CSS -->

    <link rel="stylesheet" href="{% static 'style.css' %}">

    <!-- Google Font -->

    <link 
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600;700&display=swap"
        rel="stylesheet"
    />
</head>

<!-- Dynamic City Background -->

<body 
    style="
        background: url('{{ background_image }}') no-repeat center center/cover;
    "
>

    <!-- Overlay -->

    <div class="overlay"></div>

    <!-- Main Container -->

    <div class="main-container">

        <!-- Title -->

        <div class="container">

            <h1>Weather App</h1>

        </div>

        <!-- Search Form -->

        <form method="POST">

            {% csrf_token %}

            <input 
                type="text" 
                name="city" 
                placeholder="Enter city name"
            >

            <button type="submit">
                Get Weather
            </button>

        </form>

        <!-- Error Message -->

        {% if error %}

            <div class="error-message">

                {{ error }}

            </div>

        {% else %}

        <!-- Weather Card -->

        <div class="weather">

            <!-- Left Side -->

            <div class="left">

                <h2>{{ temp }}&#176; C</h2>

                <h3>{{ city }}</h3>

                <p>{{ description }}</p>

            </div>

            <!-- Right Side -->

            <div class="right">

                <div class="icon">

                    <img 
                        src="http://openweathermap.org/img/w/{{ icon }}.png"
                        alt="Weather Icon"
                    >

                </div>

                <div class="condition">

                    <p>{{ day }}, {{ date }}</p>

                    <p>Humidity: {{ humidity }}%</p>

                    <p>Wind Speed: {{ wind_speed }} m/s</p>

                </div>

            </div>

        </div>

        {% endif %}

    </div>

</body>
</html>
